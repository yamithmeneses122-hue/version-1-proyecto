<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto a Voz | SIGNA-TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../carpeta-css/base.css">
    <link rel="stylesheet" href="../carpeta-css/texto_voz.css">
</head>
<body>

    <section class="pagina-completa">
        
       <aside class="menu-lado">
            <button type="button" class="btn-hamburguesa" id="comp-hamburguesa" aria-label="abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <h2 class="logo">SIGNA-TECH</h2>
            <p class="rol">PANEL OPERADOR</p>
            <nav class="navegacion-scroll">
                <ul>
                    <li><a href="./inicio.html" id="link-inicio" ><i class="fa-solid fa-chart-pie"></i> inicio </a></li>
                    <li><a href="./texto_voz.html" id="link-texto-voz "class="active"><i class="fa-solid fa-volume-high"></i> Texto a Voz</a></li>
                    <li><a href="./voz_a_texto.html" id="link-voz-a-texto"><i class="fa-solid fa-microphone"></i> Voz a Texto</a></li>
                    <li><a href="./camara_senas_a_texto.html" id="link-camara"><i class="fa-solid fa-camera"></i> Detección Cámara</a></li>
                    <li><a href="./diccionario.html" id="link-diccionario"><i class="fa-solid fa-book"></i> Diccionario LSC</a></li>
                    <li><a href="./avatar.html" id="link-avatar"><i class="fa-solid fa-user"></i> Avatar</a></li>
                    <li><a href="./configuraccion.html" id="link-config"><i class="fa-solid fa-gear"></i> Configuración</a></li>
                </ul>
            </nav>
            
            <footer class="caja-logout-fija">
                <a href="../index.html" id="btn-logout" title="Cerrar Sesión" onclick="return confirm('¿Desea cerrar la sesión operativa?')">
                     Cerrar Sesión
                </a>
            </footer>
        </aside>
        <main class="contenido-centro">
            
            <header class="bloque-encabezado">
                <h1 class="titulo-pagina">Módulo Texto a Voz</h1>
                <p class="subtitulo-pagina">Escribe o procesa las frases para la reproducción de audio del sintetizador de voz.</p>
            </header>

            <section class="flujo-vertical">
                
                <article class="caja-config-fila bordo-azul">
                    
                    <section class="contenedor-avatar-audio">
                        <section class="circulo-onda-animada" id="onda-sonido">
                            <i class="fa-solid fa-volume-high" id="icono-parlante"></i>
                        </section>
                        <p class="estado-reproduccion" id="txt-estado-audio">Sintetizador en espera...</p>
                    </section>

                    <section class="contenedor-input-audio">
                        <label for="texto-sintesis">Mensaje a Sintetizar</label>
                        <textarea id="texto-sintesis" placeholder="Escribe el texto o la frase que deseas que el sistema convierta en voz audible en tiempo real..."></textarea>
                    </section>

                    <section class="bloque-botones-operativos">
                        <button type="button" class="btn-accion-neon btn-azul" id="btn-reproducir">
                            <i class="fa-solid fa-play"></i> Reproducir Audio
                        </button>
                        <button type="button" class="btn-accion-neon btn-rojo" id="btn-detener" disabled>
                            <i class="fa-solid fa-stop"></i> Detener
                        </button>
                    </section>

                </article>

            </section>
        </main>

    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Control Menú Hamburguesa Responsive
            const botonHamburguesa = document.getElementById("comp-hamburguesa");
            const menuLateral = document.querySelector(".menu-lado");

            if (botonHamburguesa && menuLateral) {
                botonHamburguesa.addEventListener("click", function (e) {
                    e.stopPropagation();
                    menuLateral.classList.toggle("menu-abierto");
                    botonHamburguesa.classList.toggle("X-activa");
                });

                document.addEventListener("click", function (evento) {
                    if (!menuLateral.contains(evento.target) && !botonHamburguesa.contains(evento.target)) {
                        menuLateral.classList.remove("menu-abierto");
                        botonHamburguesa.classList.remove("X-activa");
                    }
                });
            }
            // Persistencia del Modo Claro
            const temaGuardado = localStorage.getItem('tema-sinatex-glasses') || 'oscuro';
            if (temaGuardado === 'claro') {
                document.body.classList.add('tema-claro');
            }
        });
    </script>
</body>
</html>
